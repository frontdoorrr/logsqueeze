name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: "`logsqueeze --version` output or commit hash"
      placeholder: v0.1.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `logsqueeze compress_file /path/to/log`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: log_sample
    attributes:
      label: Sample log snippet (if applicable)
      description: A minimal snippet that reproduces the issue. Redact sensitive data.
      render: text
